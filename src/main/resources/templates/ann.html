<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Объявления — lalafo.kg</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<header>
    <div class="logo">Lalafo<span style="color:#fff;opacity:.5">.kg</span></div>
    <div class="header-meta">
        Актуальные объявления · <span id="live-count">—</span> загружено
    </div>
</header>
<section class="hero">
    <h1>100 свежих<br><em>объявлений</em></h1>
    <p>Автоматическая выгрузка актуальных лотов с lalafo.kg</p>
</section>

<div class="controls">
    <button class="btn-refresh" id="btnRefresh" onclick="loadAds()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Обновить
    </button>

    <div class="count-badge" id="countBadge" style="display:none">
        <svg width="10" height="10" viewBox="0 0 10 10">
            <circle cx="5" cy="5" r="5" fill="#29d98e"/>
        </svg>
        <span id="countText">0 объявлений</span>
    </div>
</div>

<div class="grid-wrap">
    <div class="grid" id="grid"></div>
</div>

<div id="toast"></div>

<script src="/js/script.js"></script>
</body>
</html>
